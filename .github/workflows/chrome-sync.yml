name: chrome-sync

on:
  workflow_dispatch:

    inputs:
      tag_name:
        description: The tag name to release
        required: true
        default: main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:

  zip-and-upload:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install, test, and build
        run: |
          npm ci
          npm test
          npm run build

      - name: Create zip with root folder for sideloading
        run: |
          ROOT="GlobalClick2Dial"
          mkdir -p "$ROOT/dist" "$ROOT/icons"
          cp manifest.json content.css background.js options.html options.js options.css popup.html popup.js "$ROOT/"
          cp dist/phone-utils.js dist/content.js "$ROOT/dist/"
          cp icons/*.png "$ROOT/icons/"
          zip -r "GlobalClick2Dial.zip" "$ROOT"

      - uses: browser-actions/release-chrome-extension@latest
        with:
          extension-id: "cmgloibimlcofcpcocgnkmemcdahddhh"
          extension-path: "GlobalClick2Dial.zip"
          oauth-client-id: ${{ secrets.OAUTH_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.OAUTH_CLIENT_SECRET }}
          oauth-refresh-token: ${{ secrets.OAUTH_REFRESH_TOKEN }}