name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-slim
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
      version: ${{ steps.release-please.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  zip-and-upload:
    if: ${{ needs.release-please.outputs.release_created }}
    needs: release-please
    runs-on: ubuntu-slim
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Create zip with root folder for sideloading
        run: |
          ROOT="GlobalClick2Dial"
          mkdir -p "$ROOT/lib"
          cp manifest.json content.js content.css options.html options.js options.css popup.html popup.js "$ROOT/"
          cp lib/phone-utils.js "$ROOT/lib/"
          zip -r "GlobalClick2Dial.zip" "$ROOT"

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: GlobalClick2Dial.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

